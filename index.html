*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 極簡黑白灰，保留一個點綴色 */
  --ink: #161616;
  --paper: #fafafa;
  --line: #ebebeb;
  --muted: #8a8a8a;
  --accent: #d34f2c;
  --danger: #a83246;
  --ff: 'Noto Sans TC', -apple-system, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --ink: #f0f0f0;
    --paper: #131313;
    --line: #2a2a2a;
    --muted: #8f8f8f;
    --accent: #ff8362;
    --danger: #ff6f91;
  }
}

html { font-size: 17px; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--ff);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* 唯一的留白容器，所有內容垂直疊放，靠它呼吸 */
.page {
  max-width: 560px;
  margin: 0 auto;
  padding: 14vh 32px 18vh;
}

/* 一句話標頭：取代整個 masthead，只留品牌名 */
.top-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 64px;
}
.brand {
  font-family: 'MyFreehandFont', var(--ff);
  font-size: 30px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--ink);
  white-space: nowrap;
}

/* 每日心法跑馬燈：細灰字、慢速捲動，不搶視覺重量 */
.marquee-wrap {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  font-size: 12px;
  color: var(--muted);
  text-align: right;
}
.marquee-track {
  display: inline-flex;
  white-space: nowrap;
  animation: marquee-scroll 70s linear infinite;
  padding-left: 100%;
}
.marquee-track span { padding: 0 24px; }
@keyframes marquee-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-100%); }
}
@media (prefers-reduced-motion: reduce) {
  .marquee-track { animation: none; padding-left: 0; }
}

/* Hero：完成數，唯一的視覺重量來源 */
.hero {
  margin-bottom: 88px;
}
.hero .num {
  font-size: clamp(72px, 18vw, 128px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.hero .lbl {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
}

/* 挑戰內容：沒有外框、沒有標籤色塊，純文字層級 */
.challenge {
  margin-bottom: 56px;
}
.challenge-eyebrow {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
}
.challenge-headline {
  font-size: clamp(22px, 4vw, 28px);
  font-weight: 500;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 14px;
  min-height: 80px;
  transition: opacity 0.25s ease, transform 0.25s ease, color 0.3s ease;
}
.challenge-headline.fading { opacity: 0; transform: translateY(6px); }
.challenge-headline.is-done {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: var(--accent);
  text-decoration-thickness: 1px;
  animation: headline-settle 0.35s ease;
}
@keyframes headline-settle {
  0%   { transform: scale(1); }
  35%  { transform: scale(0.98); }
  100% { transform: scale(1); }
}

/* 進行中：句子持續在主色與點綴色之間輕輕呼吸，製造「還沒做完」的催促感 */
@keyframes headline-breathe {
  0%, 100% { color: var(--ink); }
  50% { color: var(--accent); }
}
.challenge-headline.in-progress { animation: headline-breathe 2.6s ease-in-out infinite; }
.challenge-tag {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 3px 10px;
  border-radius: 2px;
}
.challenge-tag:empty { display: none; }

/* 按鈕：無框線、無底色裝飾，靠字重與間距區分主次 */
.actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 56px;
}
.btn {
  font-family: var(--ff);
  font-size: 15px;
  font-weight: 500;
  line-height: 1;
  background: none;
  border: none;
  padding: 12px 10px;
  cursor: pointer;
  color: var(--ink);
  transition: opacity 0.15s, transform 0.1s ease;
}
@media (hover: hover) {
  .btn:hover { opacity: 0.6; }
}
.btn:active { opacity: 0.6; transform: scale(0.93); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
.btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.btn.primary { color: var(--ink); }
.btn.primary.btn-cancel { color: var(--muted); }
.btn.done { color: var(--accent); }

/* 行動 → 進行中 / 完成 → 已完成：按下後的輕彈回饋，維持無框無底色 */
@keyframes btn-pop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}
.btn.pop { animation: btn-pop 0.32s cubic-bezier(.34,1.56,.64,1); }

/* 完成紀錄：固定高度可滾動，無邊框，行與行只靠留白分隔 */
.log {
  padding-top: 24px;
}
.log-head {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
#historyList {
  max-height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--muted) transparent;
}
#historyList::-webkit-scrollbar { width: 6px; }
#historyList::-webkit-scrollbar-track { background: transparent; }
#historyList::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
#historyList::-webkit-scrollbar-thumb:hover { background: var(--ink); }
.history-empty {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}
.history-entry {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 0;
  font-size: 14px;
  line-height: 1.6;
  animation: fadeIn 0.25s ease;
}
.history-entry .h-main { flex: 1; min-width: 0; }
.history-entry .h-text { color: var(--ink); }
.history-entry .h-time { color: var(--muted); font-size: 12px; margin-left: 6px; }
.history-entry .h-del {
  flex-shrink: 0;
  border: none;
  background: none;
  font-family: var(--ff);
  font-size: 15px;
  line-height: 1;
  color: var(--muted);
  opacity: 0.45;
  cursor: pointer;
  padding: 2px 4px;
  transition: opacity 0.15s, color 0.15s;
}
.history-entry .h-del:hover { opacity: 1; color: var(--danger); }
.history-entry .h-del:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; opacity: 1; }

.history-date {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  padding-top: 14px;
  padding-bottom: 2px;
}
.history-date:first-child { padding-top: 0; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* 附加功能：自訂挑戰／投稿／刪除存檔，維持極簡但用形狀＋顏色做出區隔 */
.util-section {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
.util-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.pill-btn {
  font-family: var(--ff);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 16px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.pill-btn:hover { color: var(--accent); border-color: var(--accent); }
.pill-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.panel {
  display: none;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
}
.panel.open { display: block; }
.panel label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}
.panel input[type="text"],
.panel textarea {
  display: block;
  width: 100%;
  font-family: var(--ff);
  font-size: 14px;
  color: var(--ink);
  background: none;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 8px 0;
  margin-bottom: 18px;
  resize: none;
}
.panel textarea { line-height: 1.6; }

<body>

const STORAGE_KEY = 'daily-challenge-state-v1';
const CUSTOM_KEY = 'daily-challenge-custom-v1';
const MAX_HISTORY = 20;

let completedCount = 0;
let currentChallenge = null;
let actionTaken = false; // 是否已按下「行動」（進行中，會自動存檔）
let lastChallenge = null;
let history = [];
let customChallenges = [];
let isTransitioning = false;

const els = {
  head: document.getElementById('challengeHead'),
  tag: document.getElementById('tagsRow'),
  num: document.getElementById('completedNum'),
  list: document.getElementById('historyList'),
  rollBtn: document.getElementById('rollBtn'),
  doneBtn: document.getElementById('doneBtn'),
};

// --- 本機儲存：重新整理頁面後保留進度 ---
// 注意：只有按下「行動」之後，目前這句挑戰才會被存檔；
// 單純抽出但還沒按「行動」前重新整理，會回到尚未抽取的畫面。
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    completedCount = Number.isFinite(saved.completedCount) ? saved.completedCount : 0;
    history = Array.isArray(saved.history) ? saved.history.slice(0, MAX_HISTORY) : [];
    lastChallenge = saved.lastChallenge || null;
    if (saved.activeChallenge && saved.actionTaken) {
      currentChallenge = saved.activeChallenge;
      actionTaken = true;
    }
  } catch (e) {
    console.warn('讀取本機紀錄失敗，將從頭開始。', e);
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedCount,
      history,
      lastChallenge,
      activeChallenge: actionTaken ? currentChallenge : null,
      actionTaken
    }));
  } catch (e) {
    console.warn('儲存本機紀錄失敗。', e);
  }
}

// --- 自訂挑戰：使用者自己新增的挑戰，會加入抽取池 ---
function loadCustom() {
  try {
    const raw = localStorage.getItem(CUSTOM_KEY);
    customChallenges = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(customChallenges)) customChallenges = [];
  } catch (e) {
    customChallenges = [];
  }
}

function saveCustom() {
  try {
    localStorage.setItem(CUSTOM_KEY, JSON.stringify(customChallenges));
  } catch (e) {
    console.warn('儲存自訂挑戰失敗。', e);
  }
}

function getPool() {
  return challenges.concat(customChallenges);
}

// --- 每日心法跑馬燈 ---
const dailyMottos = [
  "不要等「完美時機」，現在就是最好的時間點。",
  "挑戰不在於難度，在於你願意打破慣性的那一秒。",
  "完成後記得給自己一點肯定，這是真正的積累。",
  "如果今天做不到，明天重抽。沒有失敗，只有下一次。"
];
function renderMarquee() {
  const track = document.getElementById('marqueeTrack');
  const frag = document.createDocumentFragment();
  [...dailyMottos, ...dailyMottos].forEach(m => {
    const span = document.createElement('span');
    span.textContent = m;
    frag.appendChild(span);
  });
  track.innerHTML = '';
  track.appendChild(frag);
}

// 左側按鈕：還沒按「行動」前都是「抽取」（可隨時重抽），按下行動後才變成「取消」
function onLeftBtn() {
  if (actionTaken) {
    cancelChallenge();
  } else {
    rollChallenge();
  }
}

// 右側按鈕：剛抽出時是「行動」，按下行動後變成「完成」
function onRightBtn() {
  if (!currentChallenge) return;
  if (!actionTaken) {
    takeAction();
  } else {
    markDone();
  }
}

function resetToIdle() {
  currentChallenge = null;
  actionTaken = false;
  els.head.classList.remove('fading', 'is-done');
  els.head.textContent = '按下「抽取」，看看今天要做什麼。';
  els.tag.textContent = '';
  els.rollBtn.textContent = '抽取';
  els.rollBtn.classList.remove('btn-cancel');
  els.rollBtn.setAttribute('aria-label', '抽取新挑戰');
  els.doneBtn.textContent = '行動';
  els.doneBtn.setAttribute('aria-label', '標記為進行中');
  els.head.classList.remove('in-progress');
  els.doneBtn.disabled = true;
}

function rollChallenge() {
  if (isTransitioning || actionTaken) return;

  const pool = getPool();
  if (!pool.length) return;

  let pick;
  if (lastChallenge && pool.length > 1) {
    const filtered = pool.filter(c => c.text !== lastChallenge.text);
    pick = filtered[Math.floor(Math.random() * filtered.length)];
  } else {
    pick = pool[Math.floor(Math.random() * pool.length)];
  }
  currentChallenge = pick;
  actionTaken = false;

  isTransitioning = true;
  els.rollBtn.disabled = true;
  els.head.classList.add('fading');
  window.setTimeout(() => {
    els.head.textContent = pick.text;
    els.tag.textContent = pick.tag || '';
    els.head.classList.remove('fading', 'is-done');
    els.doneBtn.disabled = false;
    els.doneBtn.textContent = '行動';
    els.doneBtn.setAttribute('aria-label', '標記為進行中');
    isTransitioning = false;
    els.rollBtn.disabled = false;
  }, 200);
}

// 取消：恢復成還沒抽取前的畫面（若原本已存檔的「行動中」狀態，一併清除）
function cancelChallenge() {
  if (isTransitioning) return;
  resetToIdle();
  saveState();
}

// 行動：標記為進行中，自動存檔，退出再回來仍是同一句；此時左邊變「取消」，右邊變「完成」
function takeAction() {
  if (!currentChallenge || actionTaken) return;
  actionTaken = true;
  els.rollBtn.textContent = '取消';
  els.rollBtn.classList.add('btn-cancel');
  els.rollBtn.setAttribute('aria-label', '取消目前挑戰');
  els.doneBtn.textContent = '完成';
  els.doneBtn.setAttribute('aria-label', '標記目前挑戰已完成');
  els.head.classList.add('in-progress');
  popButton(els.doneBtn);
  saveState();
}

// 觸發按鈕的輕彈回饋（重複點擊也能重新播放）
function popButton(el) {
  el.classList.remove('pop');
  void el.offsetWidth; // 強制 reflow，讓動畫可以重新觸發
  el.classList.add('pop');
}

function formatDateLabel(date) {
  const today = new Date();
  const startOf = d => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const diffDays = Math.round((startOf(today) - startOf(date)) / 86400000);
  if (diffDays === 0) return '今天';
  if (diffDays === 1) return '昨天';
  return `${date.getMonth() + 1}/${date.getDate()}`;
}

function markDone() {
  if (!currentChallenge) return;
  completedCount++;
  els.num.textContent = completedCount;

  const now = new Date();
  lastChallenge = currentChallenge;

  history.unshift({
    ...currentChallenge,
    at: now.toISOString(),
    time: now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
  });
  if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;

  // 停留在目前挑戰，標示為已完成（橫槓樣式），不自動抽下一個
  els.head.classList.add('is-done');
  els.doneBtn.disabled = true;
  els.doneBtn.textContent = '已完成 ✓';
  els.doneBtn.setAttribute('aria-label', '已完成');
  els.head.classList.remove('in-progress');
  popButton(els.doneBtn);
  els.rollBtn.textContent = '抽取';
  els.rollBtn.classList.remove('btn-cancel');
  els.rollBtn.setAttribute('aria-label', '抽取新挑戰');

  currentChallenge = null;
  actionTaken = false;

  renderHistory();
  saveState();
}

function renderHistory() {
  els.list.innerHTML = '';
  if (!history.length) {
    const empty = document.createElement('div');
    empty.className = 'history-empty';
    empty.textContent = '還沒有紀錄，抽一個開始吧。';
    els.list.appendChild(empty);
    return;
  }
  const frag = document.createDocumentFragment();
  let lastLabel = null;

  history.forEach((h, idx) => {
    const entryDate = h.at ? new Date(h.at) : null;
    const label = entryDate ? formatDateLabel(entryDate) : null;

    if (label && label !== lastLabel) {
      const dateHead = document.createElement('div');
      dateHead.className = 'history-date';
      dateHead.textContent = label;
      frag.appendChild(dateHead);
      lastLabel = label;
    }

    const entry = document.createElement('div');
    entry.className = 'history-entry';

    const main = document.createElement('span');
    main.className = 'h-main';

    const textSpan = document.createElement('span');
    textSpan.className = 'h-text';
    textSpan.textContent = h.text;

    const timeSpan = document.createElement('span');
    timeSpan.className = 'h-time';
    timeSpan.textContent = h.time;

    main.appendChild(textSpan);
    main.appendChild(timeSpan);

    const delBtn = document.createElement('button');
    delBtn.className = 'h-del';
    delBtn.type = 'button';
    delBtn.textContent = '×';
    delBtn.setAttribute('aria-label', '刪除這筆紀錄');
    delBtn.addEventListener('click', () => deleteHistoryEntry(idx));

    entry.appendChild(main);
    entry.appendChild(delBtn);
    frag.appendChild(entry);
  });
  els.list.appendChild(frag);
}

// 刪除單筆完成紀錄（同步扣除累積完成數，避免兩者不一致）
function deleteHistoryEntry(index) {
  history.splice(index, 1);
  completedCount = Math.max(0, completedCount - 1);
  els.num.textContent = completedCount;
  renderHistory();
  saveState();
}

// --- 刪除存檔：清空進度、紀錄與目前挑戰（不影響自訂挑戰） ---
function resetAll() {
  const ok = window.confirm('確定要刪除所有存檔嗎？完成紀錄與累積次數都會清空，且無法復原。');
  if (!ok) return;
  completedCount = 0;
  history = [];
  lastChallenge = null;
  resetToIdle();
  renderHistory();
  els.num.textContent = completedCount;
  saveState();
}

// --- 自訂挑戰／投稿面板 ---
const customPanel = document.getElementById('customPanel');
const submitPanel = document.getElementById('submitPanel');
const customToggleBtn = document.getElementById('customToggleBtn');
const submitToggleBtn = document.getElementById('submitToggleBtn');
const customText = document.getElementById('customText');
const customTag = document.getElementById('customTag');
const submitText = document.getElementById('submitText');

function togglePanel(panel, otherPanel) {
  const willOpen = !panel.classList.contains('open');
  otherPanel.classList.remove('open');
  panel.classList.toggle('open', willOpen);
}

customToggleBtn.addEventListener('click', () => togglePanel(customPanel, submitPanel));
submitToggleBtn.addEventListener('click', () => togglePanel(submitPanel, customPanel));

document.getElementById('customCancelBtn').addEventListener('click', () => {
  customPanel.classList.remove('open');
  customText.value = '';
  customTag.value = '';
});

document.getElementById('customSaveBtn').addEventListener('click', () => {
  const text = customText.value.trim();
  if (!text) { customText.focus(); return; }
  const tag = customTag.value.trim() || '自訂';
  customChallenges.push({ text, tag });
  saveCustom();
  customText.value = '';
  customTag.value = '';
  customPanel.classList.remove('open');
});

document.getElementById('submitCancelBtn').addEventListener('click', () => {
  submitPanel.classList.remove('open');
  submitText.value = '';
});

document.getElementById('submitSendBtn').addEventListener('click', () => {
  const text = submitText.value.trim();
  if (!text) { submitText.focus(); return; }
  const subject = encodeURIComponent('來自App的挑戰投稿');
  const body = encodeURIComponent('我想投稿一個挑戰：\n\n' + text);
  window.location.href = 'mailto:markstseng0@gmail.com?subject=' + subject + '&body=' + body;
  submitText.value = '';
  submitPanel.classList.remove('open');
});

document.getElementById('resetBtn').addEventListener('click', resetAll);

// --- 初始化 ---
renderMarquee();
loadCustom();
loadState();
els.num.textContent = completedCount;
renderHistory();

// 還原「行動中」的挑戰（唯有按過「行動」才會被存檔還原）
if (currentChallenge && actionTaken) {
  els.head.classList.remove('fading', 'is-done');
  els.head.textContent = currentChallenge.text;
  els.tag.textContent = currentChallenge.tag || '';
  els.rollBtn.textContent = '取消';
  els.rollBtn.classList.add('btn-cancel');
  els.rollBtn.setAttribute('aria-label', '取消目前挑戰');
  els.doneBtn.disabled = false;
  els.doneBtn.textContent = '完成';
  els.doneBtn.setAttribute('aria-label', '標記目前挑戰已完成');
  els.head.classList.add('in-progress');
} else {
  resetToIdle();
}
</script>
</body>
</html>
